workflows:
  flutter-android-workflow:
    name: Quick Blush Android Build
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        - android_credentials
    scripts:
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: Generate files (Build Runner)
        script: dart run build_runner build --delete-conflicting-outputs
      - name: Build APK with Flutter
        script: flutter build apk --release
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
    publishing:
      email:
        recipients:
          - admin@quickblush.com
        notify:
          success: true
          failure: false
  
  flutter-ios-workflow:
    name: Quick Blush iOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        - ios_credentials
    scripts:
      - name: Get Flutter packages
        script: flutter packages pub get
      - name: CocoaPods installation
        script: cd ios && pod install
      - name: Generate files (Build Runner)
        script: dart run build_runner build --delete-conflicting-outputs
      - name: Flutter build ipa and automatic versioning
        script: flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      email:
        recipients:
          - admin@quickblush.com
